name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set timestamp
        id: timestamp
        run: echo "TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Build and run tests
        run: mvn clean test package

      - name: Zip Extent Report
        id: zip_report
        run: |
          echo "Checking if ExtentReports folder exists..."
          if [ -d "ExtentReports" ]; then
            echo "Report folder found, zipping..."
            zip_file="extent-report-$TIMESTAMP.zip"
            zip -r "$zip_file" ExtentReports
            echo "ZIP_FILE=$zip_file" >> $GITHUB_ENV
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "Report folder not found."
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Extent Report
        if: steps.zip_report.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: ${{ env.ZIP_FILE }}

      - name: Send Extent Report via Gmail
        if: steps.zip_report.outputs.success == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Extent Report - GitHub Actions Run (${{ env.TIMESTAMP }})"
          to: jagdevamandeep339@gmail.com
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            Hi,

            Please find the Extent Report from the latest CI run attached.

            Regards,
            Amandeep
          attachments: ${{ env.ZIP_FILE }}